<!-- templates/confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <div class="d-flex align-items-center">
                    <i class="fas fa-exclamation-triangle fa-2x me-2"></i>
                    <h4 class="mb-0">Подтверждение удаления</h4>
                </div>
            </div>
            <div class="card-body text-center p-4">
                <i class="fas fa-camera fa-4x mb-3" style="color: #dc3545;"></i>
                <p class="lead">Вы действительно хотите удалить конфигурацию фотоловушки <strong>{{ config.imei }}</strong>?</p>
                <p class="text-danger">
                    <i class="fas fa-exclamation-circle"></i> Это действие необратимо!
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mt-4">
                        <a href="{% url 'main_config' %}" class="btn btn-secondary me-2">
                            <i class="fas fa-times"></i> Отмена
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
