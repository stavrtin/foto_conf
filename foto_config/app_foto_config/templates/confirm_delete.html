<!-- app_foto_config/templates/app_foto_config/confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Подтверждение удаления</h4>
            </div>
            <div class="card-body">
                <p>Вы действительно хотите удалить конфигурацию фотоловушки <strong>{{ config.imei }}</strong>?</p>
                <p class="text-danger">Это действие необратимо!</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="text-end">
                        <a href="{% url 'main_config' %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-danger">Удалить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
